name: stay_hydro
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  android_intent_plus: ^5.3.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/water_glass.mp3
    - assets/sounds/soft_knock.mp3
    - assets/sounds/water_drop.mp3
    - assets/mascots/
    - assets/buttons/

dependency_overrides:
  flutter_timezone: ^2.0.0