name: stay_hydro
description: "A smart hydration reminder and water intake tracking app by Slnova."
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  android_intent_plus: ^5.3.0
  flutter_svg: ^2.0.10+1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  intl: ^0.20.2
  file_picker: ^8.0.0
  auto_size_text: ^3.0.0
  

dependency_overrides:
  flutter_timezone: ^2.0.0


  # ==========================================
  # SECTION LOCK: BACKGROUND SERVICES (Phase 10.1)
  # اردو کمنٹ: بیک گراؤنڈ میں ریمائنڈرز کو زندہ رکھنے کے لیے ضروری پلگ انز
  # ==========================================

  permission_handler: ^12.0.1
  # ==========================================

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/water_glass.mp3
    - assets/sounds/soft_knock.mp3
    - assets/sounds/water_drop.mp3
    - assets/mascots/
    - assets/buttons/
    - assets/icons/app_icon.png

  



