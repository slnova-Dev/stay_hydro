name: stay_hydro
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  android_intent_plus: ^5.3.0
  flutter_svg: ^2.0.10+1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  intl: ^0.20.2

  # ==========================================
  # SECTION LOCK: BACKGROUND SERVICES (Phase 10.1)
  # اردو کمنٹ: بیک گراؤنڈ میں ریمائنڈرز کو زندہ رکھنے کے لیے ضروری پلگ انز
  # ==========================================
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0
  # ==========================================

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/water_glass.mp3
    - assets/sounds/soft_knock.mp3
    - assets/sounds/water_drop.mp3
    - assets/mascots/
    - assets/buttons/

dependency_overrides:
  flutter_timezone: ^2.0.0